services:
  db-prod:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - hermes-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: hermes-prod
      POSTGRES_DB: hermes
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:hermes-prod@db-prod:5432/hermes
      TZ: Australia/Sydney
    depends_on:
      db-prod:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: postgresql://postgres:hermes-prod@db-prod:5432/hermes
    depends_on:
      db-prod:
        condition: service_healthy
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

volumes:
  hermes-pgdata:
